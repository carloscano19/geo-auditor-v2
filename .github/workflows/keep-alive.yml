name: Keep Render Backend Awake

on:
  schedule:
    # Run every 14 minutes to prevent Render free tier from sleeping (sleeps after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows running manually from the Actions tab

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend Health Endpoint
        run: curl -s https://geo-auditor-v2.onrender.com/api/health
